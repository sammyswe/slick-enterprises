<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudStack Pro — Pricing</title>
  <style>
    body { font-family: monospace; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .plan-card { border: 2px solid #111; margin: 1rem 0; padding: 1rem; }
    .js-price { font-size: 2rem; }
  </style>
</head>
<body>
  <h1>CloudStack Pro Pricing</h1>
  <p>JavaScript-rendered pricing (requires Playwright for scraping).</p>
  <div id="pricing-root">Loading plans…</div>
  <script>
    (function () {
      var plans = [
        { id: "team", name: "Team", price: 59 },
        { id: "business", name: "Business", price: 149 },
        { id: "scale", name: "Scale", price: 399 },
      ];
      var root = document.getElementById("pricing-root");
      root.innerHTML = plans
        .map(function (plan) {
          return (
            '<div class="plan-card" data-plan-id="' + plan.id + '">' +
            "<h2>" + plan.name + "</h2>" +
            '<span class="js-price">$' + plan.price + ".00</span>" +
            "</div>"
          );
        })
        .join("");
    })();
  </script>
</body>
</html>
