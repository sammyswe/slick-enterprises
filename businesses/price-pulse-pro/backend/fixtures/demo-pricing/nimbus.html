<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimbus Cloud — Pricing</title>
  <style>
    body { font-family: Georgia, serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .tier { border: 1px solid #ccc; margin-bottom: 1rem; padding: 1rem; }
    .price-amount { font-size: 1.75rem; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Nimbus Cloud Pricing</h1>
  <p>Static HTML pricing page with ID-based selectors.</p>
  <div id="plan-basic" class="tier">
    <h2>Basic</h2>
    <p class="price-amount">$49.00</p>
  </div>
  <div id="plan-growth" class="tier">
    <h2>Growth</h2>
    <p class="price-amount">$99.00</p>
  </div>
  <div id="plan-enterprise" class="tier">
    <h2>Enterprise</h2>
    <p class="price-amount">$249.00</p>
  </div>
</body>
</html>
