[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "slick-shared"
version = "0.1.0"
description = "Shared library for Slick Enterprises HQ (config, db, models, schemas, llm, queue)."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "sqlalchemy>=2.0",
    "asyncpg>=0.29",
    "psycopg[binary]>=3.1",
    "redis>=5.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.34"]

[tool.setuptools.packages.find]
where = ["."]
include = ["slick_shared*"]

[tool.ruff]
line-length = 100
target-version = "py311"
